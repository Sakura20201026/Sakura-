<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CANTO 300+ PRO MAX</title>

<style>
:root{
--bg:#0b0220;
--card:#1c0f3a;
--accent:#a970ff;
}

body{margin:0;font-family:-apple-system;background:var(--bg);color:#fff;}

header{
padding:15px;
text-align:center;
background:#140a2e;
position:sticky;top:0;z-index:10;
}

input{
width:90%;padding:12px;border-radius:12px;border:none;
}

.tabs{
display:flex;justify-content:space-around;
background:#12082a;padding:10px;
}

.tab{cursor:pointer;color:#aaa;}
.tab.active{color:#fff;}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
padding:10px;
}

.card{
background:var(--card);
border-radius:12px;
padding:10px;
text-align:center;
font-size:13px;
}

.btn{
margin-top:5px;
padding:5px;
border:none;
border-radius:6px;
font-size:11px;
}

.play{background:#ff00cc;color:#fff;}
.fav{background:#00e5ff;}
.del{background:#ff4d4d;color:#fff;}

#player{
position:fixed;
bottom:0;
width:100%;
background:#000;
}

iframe{width:100%;height:200px;border:none;}
</style>
</head>

<body>

<header>
<h3>🎧 CANTO 300+ PRO MAX</h3>
<input placeholder="搜尋歌手..." oninput="App.search(this.value)">
</header>

<div class="tabs">
<div class="tab active" onclick="App.switch('all')">全部</div>
<div class="tab" onclick="App.switch('fav')">收藏</div>
<div class="tab" onclick="App.switch('recent')">最近</div>
</div>

<div id="app"></div>

<div id="player"></div>

<script>
const Data = {
artists:[
"張學友","劉德華","郭富城","黎明","王菲","陳奕迅","容祖兒","楊千嬅",
"謝霆鋒","張敬軒","林家謙","MC張天賦","Beyond","梅艷芳","張國榮"
]
};

const Store = {
get(key){return JSON.parse(localStorage.getItem(key)||"[]")},
set(key,val){localStorage.setItem(key,JSON.stringify(val))}
};

const App = {

state:{
view:'all',
list:[...Data.artists]
},

render(list){
const app=document.getElementById("app");
app.innerHTML='<div class="grid"></div>';
const grid=app.firstChild;

list.forEach(name=>{
const card=document.createElement("div");
card.className="card";

card.innerHTML=`
${name}<br>
<button class="btn play" onclick="App.play('${name}')">播放</button>
<button class="btn fav" onclick="App.addFav('${name}')">收藏</button>
`;

grid.appendChild(card);
});
},

switch(view){
this.state.view=view;

document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
event.target.classList.add('active');

if(view==='all'){
this.render(Data.artists);
}
if(view==='fav'){
this.render(Store.get('fav'));
}
if(view==='recent'){
this.render(Store.get('recent'));
}
},

search(text){
const filtered=Data.artists.filter(a=>a.includes(text));
this.render(filtered);
},

play(name){
document.getElementById("player").innerHTML=
`<iframe src="https://www.youtube.com/embed?listType=search&list=${name} 粵語"></iframe>`;

let recent=Store.get('recent');
recent=[name,...recent.filter(a=>a!==name)].slice(0,20);
Store.set('recent',recent);
},

addFav(name){
let fav=Store.get('fav');
if(!fav.includes(name)){
fav.push(name);
Store.set('fav',fav);
}
alert("已收藏："+name);
}

};

// init
App.render(Data.artists);
</script>

</body>
</html>
